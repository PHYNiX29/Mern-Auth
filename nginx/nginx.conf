###############################################################
# Nginx – Load Balancer for 5 Express backend instances
# Ports: 8000, 8001, 8002, 8003, 8004
###############################################################

upstream backend_cluster {
    # Round-robin load balancing (default)
    # Nginx will distribute requests evenly across all 5 instances
    server backend_1:8000;
    server backend_2:8001;
    server backend_3:8002;
    server backend_4:8003;
    server backend_5:8004;

    # Keepalive connections for efficiency
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Show which backend instance served the request (for debugging)
    add_header X-Backend-Instance $upstream_addr;

    # ── API routes → Load-balanced backend ──────────────────
    location /api/ {
        proxy_pass http://backend_cluster;

        proxy_http_version 1.1;
        proxy_set_header Connection "";          # Required for keepalive

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        # Timeouts
        proxy_connect_timeout   10s;
        proxy_send_timeout      60s;
        proxy_read_timeout      60s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 8k;

        # CORS preflight handled by backend – do not add here
    }

    # ── Health check endpoint ─────────────────────────────────
    location /health {
        proxy_pass http://backend_cluster;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── Frontend SPA ──────────────────────────────────────────
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
}
